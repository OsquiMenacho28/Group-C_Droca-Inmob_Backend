server:
  port: ${PROPERTY_SERVICE_PORT:8085}

spring:
  application:
    name: property-service
  data:
    mongodb:
      uri: mongodb://${MONGO_USER:admin}:${MONGO_PASS:admin}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${PROPERTY_DB:property_db}?authSource=${MONGO_AUTH_SOURCE:admin}
  cloud:
    config:
      enabled: false

logging:
  level:
    root: ERROR
    '[com.inmobiliaria.property_service]': DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    hostname: ${EUREKA_HOST:localhost}
    prefer-ip-address: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: properties
  images:
    bucket: property-images
  documents:
    bucket: documents
  presigned:
    expiry-minutes: 15