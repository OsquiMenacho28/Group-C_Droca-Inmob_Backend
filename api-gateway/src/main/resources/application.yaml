server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/**,/users/**,/users
          filters:
            - AuthenticationFilter
        - id: access-control-service
          uri: lb://ACCESS-CONTROL-SERVICE
          predicates:
            - Path=/roles/**,/permissions/**,/roles,/permissions
          filters:
            - AuthenticationFilter
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notifications/**
          filters:
            - AuthenticationFilter
        - id: property-service
          uri: lb://PROPERTY-SERVICE
          predicates:
            - Path=/properties/**,/properties
          filters:
            - AuthenticationFilter
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/persons/**,/persons
          filters:
            - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: DEBUG