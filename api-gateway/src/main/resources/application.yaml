server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/v1/auth/**, /api/v1/auth, /api/v1/users/**, /api/v1/users
          filters:
            - AuthenticationFilter
            - StripPrefix=2
        - id: identity-service-docs
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/identity-service/v3/api-docs
          filters:
            - StripPrefix=1

        - id: access-control-service
          uri: lb://ACCESS-CONTROL-SERVICE
          predicates:
            - Path=/api/v1/roles/**, /api/v1/roles, /api/v1/permissions/**, /api/v1/permissions
          filters:
            - AuthenticationFilter
            - StripPrefix=2
        - id: access-control-service-docs
          uri: lb://ACCESS-CONTROL-SERVICE
          predicates:
            - Path=/access-control-service/v3/api-docs
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**, /api/v1/notifications
          filters:
            - AuthenticationFilter
            - StripPrefix=2
        - id: notification-service-docs
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notification-service/v3/api-docs
          filters:
            - StripPrefix=1

        - id: property-service
          uri: lb://PROPERTY-SERVICE
          predicates:
            - Path=/api/v1/properties/**, /api/v1/properties, /api/v1/documents/**, /api/v1/documents, /api/v1/catalogos/**
          filters:
            - AuthenticationFilter
            - StripPrefix=2
        - id: property-service-docs
          uri: lb://PROPERTY-SERVICE
          predicates:
            - Path=/property-service/v3/api-docs
          filters:
            - StripPrefix=1

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/persons/**, /api/v1/persons, /api/v1/favoritos/**, /api/v1/favoritos
          filters:
            - AuthenticationFilter
            - StripPrefix=2
        - id: user-service-docs
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - StripPrefix=1

        - id: visit-calendar-service
          uri: lb://visit-calendar-service
          predicates:
            - Path=/api/v1/calendar/**, /api/v1/calendar, /api/v1/visits/**, /api/v1/visits, /api/v1/visit-requests/**, /api/v1/visit-requests, /api/v1/reassignments/**, /api/v1/reassignments, /api/v1/vehicles/**, /api/v1/vehicles, /api/v1/visits/*/reschedule, /api/v1/visits/*/rescheduled
          filters:
            - AuthenticationFilter
            - StripPrefix=2
        - id: visit-calendar-service-docs
          uri: lb://visit-calendar-service
          predicates:
            - Path=/visit-calendar-service/v3/api-docs
          filters:
            - StripPrefix=1

        - id: operation-service
          uri: lb://operation-service
          predicates:
            - Path=/api/v1/operations/**, /api/v1/operations
          filters:
            - AuthenticationFilter
            - StripPrefix=2
        - id: operation-service-docs
          uri: lb://operation-service
          predicates:
            - Path=/operation-service/v3/api-docs
          filters:
            - StripPrefix=1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: identity-service
        url: /identity-service/v3/api-docs
      - name: access-control-service
        url: /access-control-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs
      - name: property-service
        url: /property-service/v3/api-docs
      - name: user-service
        url: /user-service/v3/api-docs
      - name: visit-calendar-service
        url: /visit-calendar-service/v3/api-docs
      - name: operation-service
        url: /operation-service/v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    hostname: ${EUREKA_HOST:localhost}
    prefer-ip-address: true

logging:
  level:
    root: ERROR
    "[com.inmobiliaria.api_gateway]": DEBUG
