server:
  port: 8084

spring:
  application:
    name: user-service
  data:
    mongodb:
      uri: mongodb://admin:admin@localhost:27017/inmobiliaria_db?authSource=admin

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: ERROR
    '[com.inmobiliaria.user_service]': DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true