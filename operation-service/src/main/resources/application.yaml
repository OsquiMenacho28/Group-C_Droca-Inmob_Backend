server:
  port: ${OPERATION_SERVICE_PORT:8087}

spring:
  application:
    name: operation-service

  data:
    mongodb:
      uri: mongodb://${MONGO_USER:admin}:${MONGO_PASS:admin}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${OPERATION_DB:operation_db}?authSource=${MONGO_AUTH_SOURCE:admin}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB # Maximum size per uploaded file
      max-request-size: 12MB # Maximum total request size

# Eureka — register with the existing service-registry (port 8761)
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_HOST:localhost}
    prefer-ip-address: true

# MinIO configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin} # Change in production
  secret-key: ${MINIO_SECRET_KEY:minioadmin} # Change in production
  bucket-name: operations-payment-receipts # Bucket is auto-created on startup if it does not exist

# File upload constraints (enforced in ReceiptService)
receipt:
  upload:
    allowed-types: application/pdf,image/jpeg,image/png,image/webp
    max-size-bytes: 10485760 # 10 MB in bytes

logging:
  level:
    root: ERROR
    "[com.inmobiliaria.operation_service]": DEBUG
